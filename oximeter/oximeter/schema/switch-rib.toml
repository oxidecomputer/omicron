format_version = 1

[target]
name = "switch_rib"
description = "Maghemite router routing information base"
authz_scope = "fleet"
versions = [
    { version = 1, fields = [ "hostname", "rack_id", "sled_id", "sled_model", "sled_revision", "sled_serial", "switch_id", "switch_fab", "switch_lot", "switch_wafer", "switch_wafer_loc_x", "switch_wafer_loc_y", "switch_model", "switch_revision", "switch_serial", "switch_slot" ] }
]

[[metrics]]
name = "active_routes"
description = "The number of currently active routes"
units = "count"
datum_type = "u64"
versions = [
    { added_in = 1, fields = [ ] }
]

[fields.hostname]
type = "string"
description = "Name of the host running the Oxide router"

[fields.rack_id]
type = "uuid"
description = "ID of the rack of the sled running the Oxide router"

[fields.sled_id]
type = "uuid"
description = "ID of the sled running the Oxide router"

[fields.sled_model]
type = "string"
description = "Model number of the sled running the Oxide router"

[fields.sled_revision]
type = "u32"
description = "Revision number of the sled running the Oxide router"

[fields.sled_serial]
type = "string"
description = "Serial number of the sled running the Oxide router"

[fields.switch_id]
type = "uuid"
description = "ID of the switch running the Oxide router"

[fields.switch_fab]
type = "string"
description = "Fabrication plant identifier on of the switch running the Oxide router"

[fields.switch_lot]
type = "string"
description = "Lot number of the switch running the Oxide router"

[fields.switch_wafer]
type = "u8"
description = "Wafer number of the switch running the Oxide router"

[fields.switch_wafer_loc_x]
type = "i8"
description = "X-coordinate wafer location of the switch running the Oxide router"

[fields.switch_wafer_loc_y]
type = "i8"
description = "Y-coordinate wafer location of the switch running the Oxide router"

[fields.switch_model]
type = "string"
description = "The model number switch running the Oxide router"

[fields.switch_revision]
type = "u32"
description = "Revision number of the switch running the Oxide router"

[fields.switch_serial]
type = "string"
description = "Serial number of the switch running the Oxide router"

[fields.switch_slot]
type = "u16"
description = "Slot number of the switch running the Oxide router"
