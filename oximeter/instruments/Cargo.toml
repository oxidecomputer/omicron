[package]
name = "oximeter-instruments"
version = "0.1.0"
edition.workspace = true
license = "MPL-2.0"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true, optional = true }
cfg-if = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
dropshot = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
http = { workspace = true, optional = true }
hyper = { workspace = true, optional = true }
illumos-utils = { workspace = true, optional = true }
kstat-rs = { workspace = true, optional = true }
libc = { workspace = true, optional = true }
omicron-common = { workspace = true, optional = true }
omicron-uuid-kinds = { workspace = true, optional = true }
omicron-workspace-hack.workspace = true
oximeter = { workspace = true, optional = true }
schemars = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
slog = { workspace = true, optional = true }
slog-error-chain = { workspace = true, optional = true }
thiserror = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }

[features]
default = ["http-instruments", "cpu", "datalink", "zfs", "zone"]
http-instruments = [
    "dep:chrono",
    "dep:dropshot",
    "dep:futures",
    "dep:http",
    "dep:hyper",
    "dep:oximeter",
    "dep:schemars",
    "dep:serde",
    "dep:slog",
    "dep:uuid"
]
kstat = [
    "dep:cfg-if",
    "dep:chrono",
    "dep:futures",
    "dep:kstat-rs",
    "dep:libc",
    "dep:oximeter",
    "dep:slog",
    "dep:slog-error-chain",
    "dep:tokio",
    "dep:thiserror",
    "dep:uuid"
]
cpu = ["kstat"]
datalink = ["kstat"]
zfs = [
    "dep:anyhow",
    "dep:illumos-utils",
    "dep:omicron-common",
    "dep:omicron-uuid-kinds",
    "dep:oximeter",
    "dep:slog",
    "dep:tokio",
    "dep:thiserror",
    "dep:uuid"
]
zone = ["kstat"]

[dev-dependencies]
oximeter.workspace = true
rand.workspace = true
slog-async.workspace = true
slog-term.workspace = true
